# ============================================================
# 宏基因组多样性分析流程 — 高级配置
# ============================================================
#
# 大多数用户无需此文件。流程会自动检测
# 物种列、样本列、分类学列、分组等。
#
# 快速开始（无需配置文件）：
#   mbdiv species.xlsx metadata.xlsx -o results
#
# 仅在需要覆盖自动检测结果时使用此文件：
#   mbdiv species.xlsx metadata.xlsx -c config.yaml
#
# 以 "#" 开头的行为注释，取消注释即可启用。
# ============================================================

# ---- 输出 ----
# output_dir: "result"       # 等同于 -o 参数

# ---- 列名（留空则自动检测）----
# species_col: ""            # 如 "#Species"
# tax_col: ""                # 如 "#Taxonomy"
# sample_prefix: ""          # 如 "S" — 样本列以此前缀开头

# ---- 元数据列 ----
# meta_sample_col: "Sample"
# meta_group_col: "Group"
# meta_numeric_col: ""       # 数值列名，用于 Spearman 相关性分析

# ---- Alpha 多样性 ----
# alpha_metrics: ["Observed", "Shannon", "Simpson", "Chao1"]
# alpha_test: "kruskal"      # "kruskal" 或 "anova"
# alpha_spearman: true

# ---- Beta 多样性 ----
# beta_distance: "braycurtis"
# beta_permanova_permutations: 999
# pcoa_ellipse: true

# ---- Top-N ----
# top_n: 10

# ---- 绘图 ----
# group_order: []            # 如 ["Control", "Treatment"]
# fig_format: "both"         # "pdf"、"png" 或 "both"

# ---- 病毒/真菌过滤关键词 ----
# virus_keywords: ["Viruses", "Duplodnaviria", "Caudoviricetes", "phage"]
# fungi_keywords: ["Fungi", "Ascomycota", "Basidiomycota", "Saccharomycetes"]
# filter_domains: ["d__Viruses", "k__Viruses"]
